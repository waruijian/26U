<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字庫 APP</title>
    <style>
        :root {
            --primary: #FFA500;
            --success: #4CAF50;
            --danger: #F44336;
            --bg: #F5F7FA;
            --text: #333;
            --card-bg: #FFF;
        }
        body {
            font-family: "Helvetica Neue", Arial, "LiHei Pro", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 600px;
            min-height: 100vh;
            background-color: var(--card-bg);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }
        h1, h2, h3 { text-align: center; }
        .hidden { display: none !important; }
        
        /* Menu Styles */
        .unit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .unit-label {
            background-color: var(--bg);
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
        }
        .unit-label input { display: none; }
        .unit-label.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Settings Bar */
        .settings-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        /* Flashcard Styles */
        .flashcard {
            width: 100%;
            height: 250px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            border-radius: 10px;
            background-color: white;
            border: 2px solid var(--primary);
        }
        .flashcard-back {
            transform: rotateY(180deg);
            background-color: var(--bg);
        }

        /* Quiz Styles */
        .question-box {
            font-size: 24px;
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: var(--bg);
            border-radius: 10px;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: white;
            color: var(--text);
            border: 2px solid #ddd;
            text-align: left;
            padding: 15px;
        }
        .option-btn.correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }
        .option-btn.wrong {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        .next-btn {
            width: 100%;
            margin-top: 20px;
            background-color: var(--success);
        }

        /* Results Styles */
        .result-list {
            list-style: none;
            padding: 0;
        }
        .result-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

        <div id="area-quiz" class="hidden">

    <div id="view-results" class="hidden">

    let currentMode = '';
    let filteredVocab = [];
    let currentIndex = 0;
    let wrongAnswers = [];
    let hasGuessedWrong = false;

    // 初始化 25 個單元選項
    function initMenu() {
        const container = document.getElementById('unit-container');
        for (let i = 1; i <= 25; i++) {
            const label = document.createElement('label');
            label.className = 'unit-label';
            label.innerHTML = `<input type="checkbox" value="${i}" onchange="this.parentElement.classList.toggle('selected')"> ${i}`;
            container.appendChild(label);
        }
    }

    // 啟動模式
    function startMode(mode) {
        const selectedCheckboxes = document.querySelectorAll('#unit-container input:checked');
        if (selectedCheckboxes.length === 0) {
            alert('請至少選擇一個單元！');
            return;
        }

        const selectedUnits = Array.from(selectedCheckboxes).map(cb => parseInt(cb.value));
        filteredVocab = vocabData.filter(v => selectedUnits.includes(v.unit));
        
        if (filteredVocab.length === 0) {
            alert('所選單元尚無單字資料！請選擇有資料的單元 (1-16)。');
            return;
        }

        currentMode = mode;
        currentIndex = 0;
        wrongAnswers = [];
        
        // 洗牌 (僅測驗模式)
        if (mode !== 'flashcard') {
            filteredVocab = filteredVocab.sort(() => Math.random() - 0.5);
        }

        document.getElementById('view-menu').classList.add('hidden');
        document.getElementById('view-active').classList.remove('hidden');
        document.getElementById('area-flashcard').classList.add('hidden');
        document.getElementById('area-quiz').classList.add('hidden');

        if (mode === 'flashcard') {
            document.getElementById('area-flashcard').classList.remove('hidden');
            renderFlashcard();
        } else {
            document.getElementById('area-quiz').classList.remove('hidden');
            renderQuiz();
        }
    }

    // 更新顯示語言 (漢字/假名)
    function updateDisplay() {
        if (currentMode === 'flashcard') renderFlashcard();
        else renderQuiz();
    }

    // 渲染單字卡
    function renderFlashcard() {
        document.querySelector('.flashcard').classList.remove('flipped');
        const vocab = filteredVocab[currentIndex];
        const displayType = document.getElementById('display-type').value;
        
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${filteredVocab.length}`;
        document.getElementById('fc-front').innerText = vocab.chinese;
        document.getElementById('fc-back').innerText = displayType === 'kanji' ? vocab.kanji : vocab.kana;
    }

    function nextCard() {
        if (currentIndex < filteredVocab.length - 1) {
            currentIndex++;
            renderFlashcard();
        } else {
            alert('這已經是最後一張了！');
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            renderFlashcard();
        }
    }

    // 渲染測驗
    function renderQuiz() {
        hasGuessedWrong = false;
        document.getElementById('btn-next-quiz').classList.add('hidden');
        const vocab = filteredVocab[currentIndex];
        const displayType = document.getElementById('display-type').value;
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${filteredVocab.length}`;
        
        let questionText, correctText;
        if (currentMode === 'zh-jp') {
            questionText = vocab.chinese;
            correctText = displayType === 'kanji' ? vocab.kanji : vocab.kana;
        } else {
            questionText = displayType === 'kanji' ? vocab.kanji : vocab.kana;
            correctText = vocab.chinese;
        }

        document.getElementById('quiz-question').innerText = questionText;
        
        // 產生選項
        let options = [vocab];
        while (options.length < 4) {
            let rand = vocabData[Math.floor(Math.random() * vocabData.length)];
            if (!options.includes(rand)) {
                options.push(rand);
            }
        }
        options.sort(() => Math.random() - 0.5);

        const optionsContainer = document.getElementById('quiz-options');
        optionsContainer.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            let optText;
            if (currentMode === 'zh-jp') {
                optText = displayType === 'kanji' ? opt.kanji : opt.kana;
            } else {
                optText = opt.chinese;
            }
            
            btn.innerText = optText;
            btn.onclick = () => handleGuess(btn, opt === vocab, vocab);
            optionsContainer.appendChild(btn);
        });
    }

    function handleGuess(btn, isCorrect, vocab) {
        if (isCorrect) {
            btn.classList.add('correct');
            document.getElementById('btn-next-quiz').classList.remove('hidden');
            // 停用所有按鈕
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            
            if (hasGuessedWrong && !wrongAnswers.includes(vocab)) {
                wrongAnswers.push(vocab);
            }
        } else {
            btn.classList.add('wrong');
            btn.disabled = true;
            hasGuessedWrong = true;
        }
    }

    function nextQuiz() {
        if (currentIndex < filteredVocab.length - 1) {
            currentIndex++;
            renderQuiz();
        } else {
            showResults();
        }
    }

    // 顯示結果
    function showResults() {
        document.getElementById('view-active').classList.add('hidden');
        document.getElementById('view-results').classList.remove('hidden');
        
        const score = filteredVocab.length - wrongAnswers.length;
        document.getElementById('result-score').innerText = `答對：${score} / ${filteredVocab.length}`;
        
        const wrongList = document.getElementById('wrong-list');
        wrongList.innerHTML = '';
        
        if (wrongAnswers.length === 0) {
            wrongList.innerHTML = '<li>太棒了！全對！</li>';
        } else {
            wrongAnswers.forEach(v => {
                const li = document.createElement('li');
                li.innerText = `${v.chinese} — ${v.kanji} (${v.kana})`;
                wrongList.appendChild(li);
            });
        }
    }

    // 返回首頁
    function returnToMenu() {
        document.getElementById('view-active').classList.add('hidden');
        document.getElementById('view-results').classList.add('hidden');
        document.getElementById('view-menu').classList.remove('hidden');
    }

    // 啟動初始化
    initMenu();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('Service Worker 註冊成功', reg))
        .catch((err) => console.error('Service Worker 註冊失敗', err));
    });
  }
</script>
